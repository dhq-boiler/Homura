name: Build, Test & Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 14.0.0)'
        required: true
        type: string

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build SourceGenerator
        run: dotnet build Homura.SourceGenerator/Homura.SourceGenerator.csproj -c Release --no-restore

      - name: Build solution
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test Homura.Test/Homura.Test.csproj -c Release --no-build --verbosity normal

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Pack NuGet package
        run: dotnet pack Homura/Homura.csproj -c Release --no-build -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet
        run: dotnet nuget push "**/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
